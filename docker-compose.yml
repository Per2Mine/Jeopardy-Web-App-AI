services:
  jeopardy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jeopardy-app
    ports:
      - "3000:3000"
    volumes:
      - jeopardy_db_data:/app/data
    environment:
      - PORT=3000
      - NODE_ENV=production
      - JWT_SECRET=jeopardy_super_secret_production_key_xyz_123
    restart: unless-stopped

volumes:
  jeopardy_db_data:
