<div class="flex items-center justify-between py-2 cursor-pointer select-none" (click)="onToggle()">
  @if (label()) {
    <span class="text-sm font-semibold text-white/90">
      {{ label() }}
    </span>
  }
  
  <button
    [id]="id()"
    type="button"
    [disabled]="disabled()"
    [class]="'relative inline-flex h-6 w-11 shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-300 ease-in-out focus:outline-none focus:ring-2 focus:ring-jeopardy-accent focus:ring-offset-2 focus:ring-offset-jeopardy-dark ' + 
             (checked() ? 'bg-jeopardy-accent' : 'bg-white/10') + 
             (disabled() ? ' opacity-50 cursor-not-allowed' : '')"
    role="switch"
    [attr.aria-checked]="checked()">
    
    <span
      [class]="'pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow-md ring-0 transition duration-300 ease-in-out ' + 
               (checked() ? 'translate-x-5' : 'translate-x-0')">
    </span>
  </button>
</div>
