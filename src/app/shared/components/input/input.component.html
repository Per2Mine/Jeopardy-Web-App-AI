<div class="w-full">
  @if (label()) {
    <label 
      [for]="id()" 
      class="block text-xs font-bold text-white/70 uppercase tracking-widest mb-1.5 transition-colors duration-200">
      {{ label() }}
    </label>
  }

  <div class="relative rounded-lg shadow-sm">
    @if (type() === 'textarea') {
      <textarea
        [id]="id()"
        [placeholder]="placeholder()"
        [value]="value()"
        [disabled]="disabled()"
        [rows]="rows()"
        [maxLength]="maxLength()"
        (input)="onInput($event)"
        [class]="'w-full px-4 py-3 bg-jeopardy-blue/20 hover:bg-jeopardy-blue/30 focus:bg-jeopardy-blue/40 border text-white placeholder-white/30 rounded-lg outline-none transition-all duration-300 ' + 
                 (error() ? 'border-red-500/50 focus:border-red-500 focus:ring-4 focus:ring-red-500/20' : 'border-white/10 hover:border-white/20 focus:border-jeopardy-accent focus:ring-4 focus:ring-jeopardy-accent/20')">
      </textarea>
    } @else {
      <input
        [id]="id()"
        [type]="type()"
        [placeholder]="placeholder()"
        [value]="value()"
        [disabled]="disabled()"
        [maxLength]="maxLength()"
        (input)="onInput($event)"
        [class]="'w-full px-4 py-3 bg-jeopardy-blue/20 hover:bg-jeopardy-blue/30 focus:bg-jeopardy-blue/40 border text-white placeholder-white/30 rounded-lg outline-none transition-all duration-300 ' + 
                 (error() ? 'border-red-500/50 focus:border-red-500 focus:ring-4 focus:ring-red-500/20' : 'border-white/10 hover:border-white/20 focus:border-jeopardy-accent focus:ring-4 focus:ring-jeopardy-accent/20')">
    }
  </div>

  @if (error()) {
    <p class="text-xs text-red-500 mt-1.5 font-medium animate-fade-in">
      {{ error() }}
    </p>
  }
</div>
