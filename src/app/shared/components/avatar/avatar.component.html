<div 
  [style.width.px]="pixelSize()"
  [style.height.px]="pixelSize()"
  class="relative flex items-center justify-center select-none"
>
  @if (parsedAvatar(); as av) {
    <!-- Custom SVG Avatar -->
    <svg 
      viewBox="0 0 100 100" 
      class="w-full h-full overflow-visible"
    >
      <!-- Shadows / Glow -->
      <ellipse cx="50" cy="92" rx="22" ry="6" fill="rgba(0,0,0,0.15)"/>

      <!-- Base Body Shape -->
      @if (av.base === 0) {
        <!-- Classic Chubby Blob -->
        <path d="M 25 50 C 25 25, 75 25, 75 50 L 75 82 C 75 88, 68 92, 60 92 L 40 92 C 32 92, 25 88, 25 82 Z" [attr.fill]="color()"/>
        <ellipse cx="37" cy="91" rx="8" ry="4.5" fill="rgba(0,0,0,0.18)"/>
        <ellipse cx="63" cy="91" rx="8" ry="4.5" fill="rgba(0,0,0,0.18)"/>
      } @else if (av.base === 1) {
        <!-- Square Robot / Boxy -->
        <rect x="25" y="30" width="50" height="52" rx="10" [attr.fill]="color()"/>
        <rect x="35" y="82" width="8" height="10" fill="rgba(0,0,0,0.3)"/>
        <rect x="57" y="82" width="8" height="10" fill="rgba(0,0,0,0.3)"/>
        <ellipse cx="39" cy="92" rx="7" ry="3.5" fill="rgba(0,0,0,0.4)"/>
        <ellipse cx="61" cy="92" rx="7" ry="3.5" fill="rgba(0,0,0,0.4)"/>
        <!-- Antenna -->
        <line x1="50" y1="30" x2="50" y2="18" [attr.stroke]="color()" stroke-width="4" stroke-linecap="round"/>
        <circle cx="50" cy="15" r="5" fill="#f43f5e" class="animate-pulse"/>
      } @else if (av.base === 2) {
        <!-- Cat / Kitty -->
        <!-- Cat Ears -->
        <polygon points="25,38 31,18 47,32" [attr.fill]="color()"/>
        <polygon points="75,38 69,18 53,32" [attr.fill]="color()"/>
        <polygon points="28,35 32,22 43,31" fill="#fca5a5"/>
        <polygon points="72,35 68,22 57,31" fill="#fca5a5"/>
        <!-- Cat Body -->
        <path d="M 25 50 C 25 28, 75 28, 75 50 L 75 82 C 75 88, 68 92, 60 92 L 40 92 C 32 92, 25 88, 25 82 Z" [attr.fill]="color()"/>
        <ellipse cx="37" cy="91" rx="8" ry="4.5" fill="rgba(0,0,0,0.18)"/>
        <ellipse cx="63" cy="91" rx="8" ry="4.5" fill="rgba(0,0,0,0.18)"/>
        <!-- Cute Tail -->
        <path d="M 73 75 Q 85 70 82 55" fill="none" [attr.stroke]="color()" stroke-width="6" stroke-linecap="round"/>
      }

      <!-- Eyes Selection -->
      @if (av.eyes === 0) {
        <!-- Classic Friendly Dots -->
        <circle cx="42" cy="48" r="4.5" fill="#1e293b"/>
        <circle cx="58" cy="48" r="4.5" fill="#1e293b"/>
        <circle cx="43.5" cy="46.5" r="1.5" fill="#ffffff"/>
        <circle cx="59.5" cy="46.5" r="1.5" fill="#ffffff"/>
      } @else if (av.eyes === 1) {
        <!-- Happy / Curved (^^) -->
        <path d="M 37 50 Q 42 43 47 50" stroke="#1e293b" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        <path d="M 53 50 Q 58 43 63 50" stroke="#1e293b" stroke-width="3.5" stroke-linecap="round" fill="none"/>
      } @else if (av.eyes === 2) {
        <!-- Cool Glasses -->
        <circle cx="41" cy="48" r="7.5" fill="none" stroke="#1e293b" stroke-width="3.5"/>
        <circle cx="59" cy="48" r="7.5" fill="none" stroke="#1e293b" stroke-width="3.5"/>
        <line x1="48.5" y1="48" x2="51.5" y2="48" stroke="#1e293b" stroke-width="3.5"/>
        <line x1="33.5" y1="48" x2="27" y2="46" stroke="#1e293b" stroke-width="2.5"/>
        <line x1="66.5" y1="48" x2="73" y2="46" stroke="#1e293b" stroke-width="2.5"/>
      } @else if (av.eyes === 3) {
        <!-- Wink -->
        <circle cx="42" cy="48" r="4.5" fill="#1e293b"/>
        <circle cx="43.5" cy="46.5" r="1.5" fill="#ffffff"/>
        <path d="M 54 48 Q 58 53 62 48" stroke="#1e293b" stroke-width="3" stroke-linecap="round" fill="none"/>
      } @else if (av.eyes === 4) {
        <!-- Sleepy / Chill lines -->
        <line x1="37" y1="48" x2="47" y2="48" stroke="#1e293b" stroke-width="3.5" stroke-linecap="round"/>
        <line x1="53" y1="48" x2="63" y2="48" stroke="#1e293b" stroke-width="3.5" stroke-linecap="round"/>
      } @else if (av.eyes === 5) {
        <!-- Star Eyes -->
        <path d="M 42 41 L 44 45 L 48 45 L 45 48 L 46 52 L 42 50 L 38 52 L 39 48 L 36 45 L 40 45 Z" fill="#eab308" stroke="#ca8a04" stroke-width="1"/>
        <path d="M 58 41 L 60 45 L 64 45 L 61 48 L 62 52 L 58 50 L 54 52 L 55 48 L 52 45 L 56 45 Z" fill="#eab308" stroke="#ca8a04" stroke-width="1"/>
      } @else if (av.eyes === 6) {
        <!-- Wide Cute Anime Eyes -->
        <ellipse cx="41" cy="47" rx="6" ry="8" fill="#1e293b"/>
        <ellipse cx="59" cy="47" rx="6" ry="8" fill="#1e293b"/>
        <circle cx="39" cy="44" r="2.5" fill="#ffffff"/>
        <circle cx="57" cy="44" r="2.5" fill="#ffffff"/>
        <circle cx="43" cy="49" r="1.2" fill="#ffffff"/>
        <circle cx="61" cy="49" r="1.2" fill="#ffffff"/>
      } @else if (av.eyes === 7) {
        <!-- Angry / Focused -->
        <circle cx="42" cy="50" r="4.5" fill="#1e293b"/>
        <circle cx="58" cy="50" r="4.5" fill="#1e293b"/>
        <circle cx="43.5" cy="48.5" r="1.5" fill="#ffffff"/>
        <circle cx="59.5" cy="48.5" r="1.5" fill="#ffffff"/>
        <path d="M 34 43 L 48 47" stroke="#1e293b" stroke-width="3" stroke-linecap="round"/>
        <path d="M 66 43 L 52 47" stroke="#1e293b" stroke-width="3" stroke-linecap="round"/>
      }

      <!-- Mouth Selection -->
      @if (av.mouth === 0) {
        <!-- Small Smile -->
        <path d="M 45 61 Q 50 67 55 61" stroke="#1e293b" stroke-width="3.5" stroke-linecap="round" fill="none"/>
      } @else if (av.mouth === 1) {
        <!-- Open Smile -->
        <path d="M 43 59 Q 50 71 57 59 Z" fill="#991b1b" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
        <path d="M 46 65 Q 50 68 54 65" fill="#f43f5e"/>
      } @else if (av.mouth === 2) {
        <!-- Sad / Frown -->
        <path d="M 45 66 Q 50 60 55 66" stroke="#1e293b" stroke-width="3.5" stroke-linecap="round" fill="none"/>
      } @else if (av.mouth === 3) {
        <!-- Straight line -->
        <line x1="45" y1="63" x2="55" y2="63" stroke="#1e293b" stroke-width="3.5" stroke-linecap="round"/>
      } @else if (av.mouth === 4) {
        <!-- Tongue Out -->
        <line x1="44" y1="60" x2="56" y2="60" stroke="#1e293b" stroke-width="3.5" stroke-linecap="round"/>
        <path d="M 48 60 C 48 67, 52 67, 52 60 Z" fill="#f43f5e" stroke="#1e293b" stroke-width="2.5"/>
        <line x1="50" y1="60" x2="50" y2="64" stroke="#1e293b" stroke-width="1.5"/>
      } @else if (av.mouth === 5) {
        <!-- Surprise / O-mouth -->
        <circle cx="50" cy="63" r="4.5" fill="#1e293b"/>
      }

      <!-- Accessories / Headwear Selection -->
      @if (av.accessory === 1) {
        <!-- Crown -->
        <path d="M 33 28 L 37 14 L 45 22 L 50 12 L 55 22 L 63 14 L 67 28 Z" fill="#fbbf24" stroke="#d97706" stroke-width="2" stroke-linejoin="round"/>
        <circle cx="37" cy="13" r="2.5" fill="#ef4444"/>
        <circle cx="50" cy="11" r="2.5" fill="#3b82f6"/>
        <circle cx="63" cy="13" r="2.5" fill="#ef4444"/>
        <rect x="35" y="25" width="30" height="3" fill="#d97706" rx="1.5"/>
      } @else if (av.accessory === 2) {
        <!-- Party Hat -->
        <polygon points="36,29 50,4 64,29" fill="#ec4899" stroke="#db2777" stroke-width="1.5"/>
        <circle cx="50" cy="3" r="4.5" fill="#f59e0b" stroke="#d97706" stroke-width="1"/>
        <path d="M 40 21 L 60 13" stroke="#3b82f6" stroke-width="2.5"/>
        <path d="M 43 14 L 57 7" stroke="#22c55e" stroke-width="2.5"/>
      } @else if (av.accessory === 3) {
        <!-- Fedora Hat -->
        <ellipse cx="50" cy="27" rx="28" ry="4" fill="#334155" stroke="#1e293b" stroke-width="2"/>
        <path d="M 34 27 L 37 13 C 37 11, 63 11, 63 13 L 66 27 Z" fill="#1e293b" stroke="#0f172a" stroke-width="1.5"/>
        <rect x="35.5" y="22" width="29" height="3" fill="#ef4444"/>
      } @else if (av.accessory === 4) {
        <!-- Pirate Hat -->
        <path d="M 22 26 C 35 28, 65 28, 78 26 C 74 15, 26 15, 22 26 Z" fill="#1e293b" stroke="#0f172a" stroke-width="2"/>
        <circle cx="50" cy="21" r="3.5" fill="#ffffff"/>
        <line x1="47" y1="21" x2="53" y2="21" stroke="#0f172a" stroke-width="1.5"/>
        <line x1="50" y1="18" x2="50" y2="24" stroke="#0f172a" stroke-width="1.5"/>
      } @else if (av.accessory === 5) {
        <!-- Cute Ribbon / Bow -->
        <path d="M 23 23 C 18 16, 28 15, 30 24 C 33 15, 43 16, 38 23 Z" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5"/>
        <circle cx="31" cy="21" r="3.5" fill="#b91c1c"/>
      } @else if (av.accessory === 6) {
        <!-- Chef Hat -->
        <path d="M 34 29 L 34 24 C 34 24, 29 11, 41 11 C 45 11, 48 14, 50 11 C 52 14, 55 11, 59 11 C 71 11, 66 24, 66 24 L 66 29 Z" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" stroke-linejoin="round"/>
        <rect x="36" y="26" width="28" height="4" fill="#cbd5e1" rx="1"/>
      } @else if (av.accessory === 7) {
        <!-- Mustache -->
        <path d="M 38 59 C 41 55, 48 55, 50 58 C 52 55, 59 55, 62 59 C 66 61, 57 65, 50 61 C 43 65, 34 61, 38 59 Z" fill="#1e293b" stroke="#0f172a" stroke-width="1.5"/>
      }
    </svg>
  } @else {
    <!-- Fallback Initials Circle -->
    <div 
      [style.background-color]="color()"
      class="w-full h-full rounded-full flex items-center justify-center font-black shadow-md border border-white/10"
      [class.text-jeopardy-dark]="isGold()"
      [class.text-white]="!isGold()"
      [style.font-size.px]="pixelSize() * 0.4"
    >
      {{ initials() }}
    </div>
  }
</div>
